<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 760" font-family="'DejaVu Sans', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="tri" markerWidth="16" markerHeight="16" refX="13" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L13,6 L1,11 z" fill="#ffffff" stroke="#333" stroke-width="1.2"/>
    </marker>
    <marker id="diamond" markerWidth="20" markerHeight="14" refX="1" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,6 L9,1 L17,6 L9,11 z" fill="#ffffff" stroke="#333" stroke-width="1.2"/>
    </marker>
    <marker id="open" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,5 L0,10" fill="none" stroke="#333" stroke-width="1.2"/>
    </marker>
  </defs>

  <style>
    .box   { fill:#ffffff; stroke:#333; stroke-width:1.4; }
    .hdr   { fill:#eef2f7; stroke:#333; stroke-width:1.4; }
    .name  { font-weight:bold; text-anchor:middle; }
    .stereo{ font-style:italic; text-anchor:middle; fill:#555; }
    .mem   { text-anchor:start; }
    .rel   { fill:none; stroke:#333; stroke-width:1.3; }
    .dash  { stroke-dasharray:6 4; }
    .lbl   { fill:#333; }
    .title { font-weight:bold; font-size:18px; }
  </style>

  <text x="20" y="28" class="title">UML class diagram &#8212; lab01_UML / task_3_3 (Composite)</text>

  <!-- Readable interface -->
  <g>
    <rect class="hdr" x="660" y="50" width="250" height="42"/>
    <text x="785" y="68" class="stereo">&#171;interface&#187;</text>
    <text x="785" y="85" class="name">Readable</text>
    <rect class="box" x="660" y="92" width="250" height="52"/>
    <text x="672" y="112" class="mem">+ checkout() : void</text>
    <text x="672" y="132" class="mem">+ returnBook() : void</text>
  </g>

  <!-- LibraryClient -->
  <g>
    <rect class="hdr" x="60" y="60" width="330" height="26"/>
    <text x="225" y="79" class="name">LibraryClient</text>
    <rect class="box" x="60" y="86" width="330" height="66"/>
    <text x="72" y="106" class="mem">+ main(args : String[]) : void</text>
    <text x="72" y="126" class="mem">+ checkoutReadable(r : Readable) : void</text>
    <text x="72" y="146" class="mem">+ returnReadable(r : Readable) : void</text>
  </g>

  <!-- Book leaf -->
  <g>
    <rect class="hdr" x="150" y="280" width="290" height="26"/>
    <text x="295" y="299" class="name">Book</text>
    <rect class="box" x="150" y="306" width="290" height="48"/>
    <text x="162" y="326" class="mem">~ name : String</text>
    <text x="162" y="346" class="mem">~ checkedOut : boolean</text>
    <rect class="box" x="150" y="354" width="290" height="72"/>
    <text x="162" y="374" class="mem">+ Book(name : String, checkedOut : boolean)</text>
    <text x="162" y="396" class="mem">+ checkout() : void</text>
    <text x="162" y="416" class="mem">+ returnBook() : void</text>
  </g>

  <!-- BookCollection composite -->
  <g>
    <rect class="hdr" x="640" y="270" width="350" height="26"/>
    <text x="815" y="289" class="name">BookCollection</text>
    <rect class="box" x="640" y="296" width="350" height="26"/>
    <text x="652" y="315" class="mem">- children : ArrayList&lt;Readable&gt;</text>
    <rect class="box" x="640" y="322" width="350" height="112"/>
    <text x="652" y="342" class="mem">+ getChildren() : ArrayList&lt;Readable&gt;</text>
    <text x="652" y="362" class="mem">+ add(readable : Readable) : void</text>
    <text x="652" y="382" class="mem">+ remove(readable : Readable) : void</text>
    <text x="652" y="402" class="mem">+ checkout() : void</text>
    <text x="652" y="422" class="mem">+ returnBook() : void</text>
  </g>

  <!-- FictionBook -->
  <g>
    <rect class="hdr" x="70" y="560" width="300" height="26"/>
    <text x="220" y="579" class="name">FictionBook</text>
    <rect class="box" x="70" y="586" width="300" height="26"/>
    <text x="82" y="605" class="mem">~ isAPlay : boolean</text>
    <rect class="box" x="70" y="612" width="300" height="28"/>
    <text x="82" y="632" class="mem">+ FictionBook(name : String, isAPlay : boolean)</text>
  </g>

  <!-- NonfictionBook -->
  <g>
    <rect class="hdr" x="420" y="560" width="300" height="26"/>
    <text x="570" y="579" class="name">NonfictionBook</text>
    <rect class="box" x="420" y="586" width="300" height="28"/>
    <text x="432" y="606" class="mem">+ NonfictionBook(name : String)</text>
  </g>

  <!-- Book realizes Readable -->
  <path class="rel dash" d="M440,330 L560,300 Q620,288 660,170" marker-end="url(#tri)"/>
  <!-- BookCollection realizes Readable -->
  <path class="rel dash" d="M815,270 L810,150" marker-end="url(#tri)"/>

  <!-- FictionBook extends Book -->
  <path class="rel" d="M220,560 L250,440 L260,440 Q280,438 290,430" marker-end="url(#tri)"/>
  <!-- NonfictionBook extends Book -->
  <path class="rel" d="M570,560 L420,460 Q360,438 350,430" marker-end="url(#tri)"/>

  <!-- BookCollection aggregates Readable (children) -->
  <path class="rel" d="M990,300 Q1030,250 1010,140 Q1000,100 912,95" marker-start="url(#diamond)" marker-end="url(#open)"/>
  <text x="1012" y="200" class="lbl">children</text>
  <text x="1012" y="216" class="lbl">0..*</text>

  <!-- LibraryClient depends on Readable -->
  <path class="rel dash" d="M390,100 L660,100" marker-end="url(#open)"/>
  <text x="470" y="92" class="lbl">&#171;use&#187;</text>

  <!-- Legend -->
  <g transform="translate(20,680)">
    <text x="0" y="0" font-weight="bold">Позначення:</text>
    <line class="rel dash" x1="80" y1="-4" x2="120" y2="-4" marker-end="url(#tri)"/>
    <text x="130" y="0">реалізація (implements)</text>
    <line class="rel" x1="350" y1="-4" x2="390" y2="-4" marker-end="url(#tri)"/>
    <text x="400" y="0">наслідування (extends)</text>
    <line class="rel" x1="640" y1="-4" x2="680" y2="-4" marker-start="url(#diamond)" marker-end="url(#open)"/>
    <text x="690" y="0">агрегація</text>
    <line class="rel dash" x1="830" y1="-4" x2="870" y2="-4" marker-end="url(#open)"/>
    <text x="880" y="0">залежність</text>
  </g>
</svg>
